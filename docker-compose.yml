version: "3.9"

services:
  app:
    build: .
    image: customer-service-automation-multi-agent:latest
    container_name: cs-multi-agent
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Optional: add a reverse proxy or other services here.
