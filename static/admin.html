<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>客服管理后台</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  body { margin:0; font-family:-apple-system,'PingFang SC',sans-serif; background:#f6f8fc; color:#222; }
  header { padding:14px 24px; background:#1f2937; color:#fff; display:flex; justify-content:space-between; align-items:center; }
  header h1 { margin:0; font-size:18px; }
  main { display:grid; grid-template-columns: 320px 1fr; gap:16px; padding:16px; height:calc(100vh - 64px); box-sizing:border-box; }
  .panel { background:#fff; border-radius:10px; padding:16px; box-shadow:0 4px 14px rgba(0,0,0,0.05); overflow:auto; }
  .stats { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-bottom:14px; }
  .stat { background:#eef2ff; padding:10px; border-radius:8px; text-align:center; }
  .stat .num { font-size:22px; font-weight:bold; color:#4f46e5; }
  .stat .lbl { font-size:12px; color:#666; }
  .session { padding:8px 10px; border-bottom:1px solid #eee; cursor:pointer; }
  .session:hover { background:#f3f4f6; }
  .session.active { background:#e0e7ff; }
  .session .id { font-size:12px; color:#666; }
  .session .badge { display:inline-block; padding:1px 6px; border-radius:6px; font-size:11px; margin-left:6px; }
  .b-active { background:#d1fae5; color:#065f46; }
  .b-takeover { background:#fde68a; color:#92400e; }
  .b-closed { background:#e5e7eb; color:#374151; }
  .messages { height: calc(100% - 100px); overflow:auto; padding:8px; }
  .m { margin:8px 0; }
  .m .role { font-size:11px; color:#888; }
  .m .body { padding:8px 12px; border-radius:8px; background:#f3f4f6; display:inline-block; max-width:80%; white-space:pre-wrap; }
  .m.user .body { background:#4f46e5; color:#fff; }
  .actions { display:flex; gap:6px; margin-top:8px; }
  .actions button, .actions input { padding:6px 10px; border-radius:6px; border:1px solid #ccc; }
  .actions button { background:#4f46e5; color:#fff; border:none; cursor:pointer; }
  #login { max-width:340px; margin:80px auto; padding:24px; background:#fff; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,0.05);}
  #login input { display:block; width:100%; padding:8px; margin:6px 0; box-sizing:border-box; }
  #login button { width:100%; padding:10px; background:#4f46e5; color:#fff; border:none; border-radius:6px; }
</style>
</head>
<body>
<div id="login">
  <h2>客服管理后台登录</h2>
  <input id="u" placeholder="用户名" value="admin" />
  <input id="p" type="password" placeholder="密码" value="admin123" />
  <button onclick="login()">登录</button>
  <div id="err" style="color:red;margin-top:8px;"></div>
</div>
<div id="dashboard" style="display:none;">
<header>
  <h1>客服管理后台</h1>
  <div><span id="user-tag"></span> · <a href="#" onclick="logout()" style="color:#9ca3af;">退出</a></div>
</header>
<main>
  <div class="panel">
    <div class="stats" id="stats"></div>
    <h3>会话列表</h3>
    <div id="sessions"></div>
  </div>
  <div class="panel" id="detail">
    <h3>请选择会话</h3>
    <div id="msgs" class="messages"></div>
    <div id="ctrl" style="display:none;">
      <div class="actions">
        <button onclick="takeover()">人工接管</button>
        <button onclick="release()">释放</button>
      </div>
      <div class="actions">
        <input id="reply" placeholder="人工回复内容" style="flex:1;" />
        <button onclick="humanReply()">发送</button>
      </div>
    </div>
  </div>
</main>
</div>
<script>
let token = localStorage.getItem('admin_token');
let activeSession = null;

async function api(path, opts={}) {
  const headers = opts.headers || {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (opts.body && !(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const resp = await fetch(path, { ...opts, headers });
  if (resp.status === 401) { logout(); throw new Error('unauthenticated'); }
  return resp.json();
}

async function login() {
  const u = document.getElementById('u').value;
  const p = document.getElementById('p').value;
  try {
    const data = await api('/admin/login', { method:'POST', body: JSON.stringify({ username:u, password:p })});
    if (!data.access_token) throw new Error(data.detail || 'login failed');
    token = data.access_token;
    localStorage.setItem('admin_token', token);
    showDash();
  } catch(e) { document.getElementById('err').textContent = e.message; }
}
function logout() { localStorage.removeItem('admin_token'); token=null; location.reload(); }
function showDash() {
  document.getElementById('login').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('user-tag').textContent = 'admin';
  refresh();
  setInterval(refresh, 5000);
}
async function refresh() {
  const stats = await api('/stats');
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${stats.total_sessions}</div><div class="lbl">总会话</div></div>
    <div class="stat"><div class="num">${stats.active_sessions}</div><div class="lbl">进行中</div></div>
    <div class="stat"><div class="num">${stats.takeover_sessions}</div><div class="lbl">人工接管</div></div>
    <div class="stat"><div class="num">${stats.open_tickets}</div><div class="lbl">未处理工单</div></div>`;
  const sessions = await api('/sessions?limit=50');
  document.getElementById('sessions').innerHTML = sessions.map(s => `
    <div class="session ${activeSession===s.id?'active':''}" onclick="openSession('${s.id}')">
      <div><b>${s.customer_name||'匿名'}</b> · ${s.channel}
        <span class="badge ${s.status==='active'?'b-active':(s.status==='takeover'?'b-takeover':'b-closed')}">${s.status}</span>
      </div>
      <div class="id">${s.id} · agent=${s.current_agent||'-'}</div>
    </div>`).join('') || '<div style="color:#888;">暂无</div>';
  if (activeSession) loadMsgs(activeSession);
}
async function openSession(id) { activeSession = id; document.getElementById('ctrl').style.display='block'; await loadMsgs(id); refresh(); }
async function loadMsgs(id) {
  const msgs = await api(`/sessions/${id}/messages?limit=200`);
  document.getElementById('msgs').innerHTML = msgs.map(m => `
    <div class="m ${m.role==='user'?'user':''}">
      <div class="role">[${m.role}${m.agent_name? ' · '+m.agent_name:''}] ${new Date(m.created_at).toLocaleString()}</div>
      <div class="body">${escapeHtml(m.content)}</div>
    </div>`).join('');
  const box = document.getElementById('msgs'); box.scrollTop = box.scrollHeight;
}
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
async function takeover() {
  await api(`/sessions/${activeSession}/takeover`, { method:'POST', body: JSON.stringify({ session_id: activeSession, operator:'admin', note:'手工接管' })});
  refresh();
}
async function release() {
  await api(`/sessions/${activeSession}/release`, { method:'POST', body: JSON.stringify({ session_id: activeSession, operator:'admin' })});
  refresh();
}
async function humanReply() {
  const t = document.getElementById('reply').value.trim();
  if (!t) return;
  await api(`/sessions/${activeSession}/human-reply`, { method:'POST', body: JSON.stringify({ session_id: activeSession, operator:'admin', message:t })});
  document.getElementById('reply').value=''; loadMsgs(activeSession);
}

if (token) showDash();
</script>
</body>
</html>
